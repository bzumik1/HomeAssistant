packages:
  common: !include common.yaml

esp32_improv:
  authorizer: none
  wifi_timeout: 5min

esphome:
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

#Disable logging/UART
logger:
# level: NONE
  baud_rate: 0

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true
  id: I2C

sensor:
  - platform: internal_temperature
    name: "interní teplota"
    accuracy_decimals: 2
    update_interval: 30s

  - platform: homeassistant
    id: ha_brightness2
    entity_id: switch.adaptive_lighting_test
    attribute: brightness_pct
    internal: true
    on_value:
      - lambda: |-
          ESP_LOGI("main", "Hodnota jasu 2 je %.1f %%", x);

number:
  - platform: homeassistant
    id: ha_brightness
    entity_id: input_number.jas_svetla
    on_value:
      - lambda: |-
          ESP_LOGI("main", "Hodnota jasu 1 je %.1f %%", x);
    
binary_sensor:
  - platform: gpio
    pin: 2
    name: "tlačítko 1"
    filters:
      - invert:
      - delayed_on_off: 20ms
  - platform: gpio
    pin: 8
    name: "tlačítko 2"
    filters:
      - invert:
      - delayed_on_off: 20ms
  - platform: gpio
    pin: 9
    name: "tlačítko 3"
    filters:
      - invert:
      - delayed_on_off: 20ms
    on_multi_click:
      # Single press
      - timing:
          - ON for at most 400ms
          - OFF for at least 210ms
        then:
          - lambda: |-
              float brightness = 1.0f;
              if (id(ha_brightness).has_state()) {
                brightness = id(ha_brightness).state / 100.0f;
              }
              if (id(monochromatic_light).current_values.is_on()) {
                id(monochromatic_light).turn_off().perform();
              } else {
                id(monochromatic_light).turn_on().set_brightness(brightness).perform();
              }

      # Double press
      - timing:
        - ON for at most 400ms
        - OFF for at most 200ms
        - ON for at most 400ms
        - OFF for at least 200ms
        then:
          - homeassistant.event:
              event: esphome.${name}_switch3_double_press

      # Long press
      - timing:
        - ON for at least 500ms
        then:
          - lambda: |-
              if (id(monochromatic_light).current_values.is_on() && id(monochromatic_light).current_values.get_brightness() > 0.99f) {
                id(monochromatic_light).turn_on().set_brightness(0.01f).perform();
              } else {
                id(monochromatic_light).turn_on().set_brightness(1.0f).perform();
              }


output:
  - platform: ledc
    pin: GPIO5
    frequency: 19531Hz
    id: LED_channel_1
  - platform: ledc
    pin: GPIO4
    frequency: 19531Hz
    id: LED_channel_2
  - platform: ledc
    pin: GPIO1
    frequency: 19531Hz
    id: LED_channel_3
  - platform: ledc
    pin: GPIO0
    frequency: 19531Hz
    id: LED_channel_4
  - platform: ledc
    pin: GPIO3
    frequency: 19531Hz
    id: LED_channel_5

  - platform: template
    id: LED_channel_1_2_3_4_5
    type: float
    write_action:
      - output.set_level:
          id: LED_channel_1
          level: !lambda return state;
      - output.set_level:
          id: LED_channel_2
          level: !lambda return state;
      - output.set_level:
          id: LED_channel_3
          level: !lambda return state;
      - output.set_level:
          id: LED_channel_4
          level: !lambda return state;
      - output.set_level:
          id: LED_channel_5
          level: !lambda return state;

light:
  - platform: monochromatic
    id: monochromatic_light
    name: "světlo"
    icon: mdi:led-strip-variant
    output: LED_channel_1_2_3_4_5
    # Koriguje minimální jas, čím vyšší hodnota tim menší minimalní jas
    gamma_correct: 1.2
    restore_mode: ALWAYS_ON


